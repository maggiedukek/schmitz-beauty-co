# Tells Netlify how to build and publish the site automatically.
# Every time you push a change to GitHub, Netlify runs this build.

[build]
  command = "npx expo export --platform web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Makes navigation work correctly for a single-page app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
