# Plain static website (HTML/CSS/JS) — no real build.
# We copy the static files into "dist" and publish that, so it works
# regardless of any leftover publish-directory setting from the old Expo app.

[build]
  command = "rm -rf dist && mkdir -p dist && cp index.html book.html styles.css script.js dist/ && cp -r images dist/"
  publish = "dist"
