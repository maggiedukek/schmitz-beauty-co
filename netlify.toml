# Plain static website (HTML/CSS/JS) — no real build.
# We copy the static files into "dist" and publish that, so it works
# regardless of any leftover publish-directory setting from the old Expo app.

[build]
  command = "rm -rf dist && mkdir -p dist && cp index.html book.html admin.html styles.css script.js dist/ && cp -r images dist/"
  publish = "dist"
  functions = "netlify/functions"

# Brenna's private dashboard lives at /admin (serves admin.html, URL stays clean).
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# --- admin.schmitzbeautyco.com ---
# The subdomain shows the dashboard, BUT real asset/function requests must pass
# through first — otherwise the catch-all below rewrites styles.css, script.js,
# etc. to admin.html and the page renders unstyled. Order matters: first match wins.

[[redirects]]
  from = "https://admin.schmitzbeautyco.com/styles.css"
  to = "/styles.css"
  status = 200
  force = true

[[redirects]]
  from = "https://admin.schmitzbeautyco.com/script.js"
  to = "/script.js"
  status = 200
  force = true

[[redirects]]
  from = "https://admin.schmitzbeautyco.com/images/*"
  to = "/images/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://admin.schmitzbeautyco.com/.netlify/*"
  to = "/.netlify/:splat"
  status = 200
  force = true

# Everything else on the subdomain shows the dashboard.
[[redirects]]
  from = "https://admin.schmitzbeautyco.com/*"
  to = "/admin.html"
  status = 200
  force = true
